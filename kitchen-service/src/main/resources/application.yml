server:
  port: 8083

spring:
  application:
    name: kitchen-service
  datasource:
    url: jdbc:postgresql://kitchen-db:5432/kitchendb
    username: kitchenuser
    password: kitchenpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    HTTP: INFO
    com.restaurant.kitchen: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [kitchen-service] [%thread] %logger{0} - %msg%n"
