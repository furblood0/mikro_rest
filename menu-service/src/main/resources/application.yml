server:
  port: 8081

spring:
  application:
    name: menu-service
  datasource:
    url: jdbc:postgresql://menu-db:5432/menudb
    username: menuuser
    password: menupass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    HTTP: INFO
    com.restaurant.menu: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [menu-service] [%thread] %logger{0} - %msg%n"
